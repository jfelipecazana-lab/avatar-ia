<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar IA — Habla con quien quieras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    :root {
      --bg: #0F0E0C; --bg2: #161512; --bg3: #1E1C18;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --text: #F0EDE6; --text2: #9C9789; --text3: #5C5A54;
      --gold: #C9A84C; --gold2: #E8C97A; --gold-dim: rgba(201,168,76,0.15);
      --red: #C0544A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
    .sidebar { width: 260px; min-width: 260px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg2); }
    .sidebar-top { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
    .app-title { font-family: 'Lora', serif; font-size: 17px; font-weight: 400; color: var(--gold2); letter-spacing: 0.02em; margin-bottom: 12px; }
    .new-btn { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px dashed var(--border2); background: transparent; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .new-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .avatars-list { flex: 1; overflow-y: auto; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; }
    .av-item { padding: 10px 12px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.15s; position: relative; }
    .av-item:hover { background: var(--bg3); border-color: var(--border); }
    .av-item.active { background: var(--bg3); border-color: var(--gold); }
    .av-thumb { width: 38px; height: 38px; min-width: 38px; border-radius: 50%; background: var(--gold-dim); border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Lora', serif; font-size: 15px; color: var(--gold2); overflow: hidden; }
    .av-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .av-meta { flex: 1; min-width: 0; }
    .av-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .av-count { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .av-del { opacity: 0; font-size: 15px; color: var(--text3); cursor: pointer; padding: 2px; transition: all 0.15s; }
    .av-item:hover .av-del { opacity: 1; }
    .av-del:hover { color: var(--red); }
    .empty-list { padding: 30px 16px; text-align: center; color: var(--text3); font-size: 13px; line-height: 1.7; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .setup { flex: 1; overflow-y: auto; padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; }
    .setup-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .setup-title { font-family: 'Lora', serif; font-size: 20px; font-weight: 400; color: var(--gold2); }
    .saved-badge { font-size: 11px; color: var(--gold); display: flex; align-items: center; gap: 4px; opacity: 0; transition: opacity 0.3s; }
    .saved-badge.show { opacity: 1; }
    .field-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .text-in { width: 100%; padding: 10px 14px; border: 1px solid var(--border2); border-radius: 8px; background: var(--bg3); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; transition: border-color 0.15s; }
    .text-in:focus { outline: none; border-color: var(--gold); }
    .text-in::placeholder { color: var(--text3); }
    textarea.text-in { resize: none; line-height: 1.6; }
    .photo-row { display: flex; align-items: center; gap: 16px; }
    .photo-circle { width: 60px; height: 60px; border-radius: 50%; background: var(--gold-dim); border: 1px dashed var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Lora', serif; font-size: 20px; color: var(--gold2); cursor: pointer; overflow: hidden; transition: all 0.2s; flex-shrink: 0; }
    .photo-circle:hover { background: rgba(201,168,76,0.25); }
    .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
    .photo-hint { font-size: 12px; color: var(--text3); line-height: 1.6; }
    .mem-list { display: flex; flex-direction: column; gap: 4px; max-height: 110px; overflow-y: auto; margin-bottom: 8px; }
    .mem-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 10px; background: var(--bg3); border-radius: 6px; border: 1px solid var(--border); font-size: 12px; color: var(--text2); }
    .mem-item i { font-size: 13px; color: var(--gold); margin-top: 1px; flex-shrink: 0; }
    .mem-item span { flex: 1; line-height: 1.5; }
    .mem-x { font-size: 13px; color: var(--text3); cursor: pointer; flex-shrink: 0; }
    .mem-x:hover { color: var(--red); }
    .mem-row { display: flex; gap: 6px; }
    .mem-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border2); border-radius: 8px; background: var(--bg3); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; }
    .mem-row input:focus { outline: none; border-color: var(--gold); }
    .mem-row input::placeholder { color: var(--text3); }
    .add-btn { padding: 8px 12px; border: 1px solid var(--border2); border-radius: 8px; background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; white-space: nowrap; }
    .add-btn:hover { border-color: var(--gold); color: var(--gold); }
    .activate-btn { padding: 13px; border-radius: 10px; border: none; background: linear-gradient(135deg, #C9A84C, #E8C97A); color: #0F0E0C; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s; }
    .activate-btn:hover { opacity: 0.9; }
    .chat { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .chat-head { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .ch-av { width: 38px; height: 38px; border-radius: 50%; background: var(--gold-dim); border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Lora', serif; font-size: 15px; color: var(--gold2); overflow: hidden; flex-shrink: 0; }
    .ch-av img { width: 100%; height: 100%; object-fit: cover; }
    .ch-info h3 { font-family: 'Lora', serif; font-size: 16px; font-weight: 400; color: var(--gold2); }
    .ch-info p { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .ch-edit { margin-left: auto; font-size: 16px; color: var(--text3); cursor: pointer; padding: 4px; transition: color 0.15s; }
    .ch-edit:hover { color: var(--gold); }
    .messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { display: flex; gap: 10px; max-width: 82%; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg-av { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'Lora', serif; font-size: 12px; color: var(--gold); overflow: hidden; flex-shrink: 0; }
    .msg-av img { width: 100%; height: 100%; object-fit: cover; }
    .msg.user .msg-av { background: var(--gold-dim); border-color: var(--gold); color: var(--gold2); font-size: 10px; font-family: 'DM Sans', sans-serif; }
    .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
    .msg:not(.user) .bubble { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: 4px 14px 14px 14px; }
    .msg.user .bubble { background: var(--gold-dim); border: 1px solid var(--gold); color: var(--text); border-radius: 14px 4px 14px 14px; }
    .msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; padding: 0 4px; }
    .msg.user .msg-time { text-align: right; }
    .msg-actions { display: flex; gap: 6px; margin-top: 4px; padding: 0 4px; }
    .play-btn { background: transparent; border: 1px solid var(--border2); border-radius: 99px; padding: 3px 10px; font-size: 11px; color: var(--text3); cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; }
    .play-btn:hover { border-color: var(--gold); color: var(--gold); }
    .play-btn.playing { border-color: var(--gold); color: var(--gold); }
    .typing-wrap { display: flex; gap: 10px; align-items: flex-start; }
    .dots { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
    .dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: pulse 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    .input-wrap { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
    .chat-in { flex: 1; border: 1px solid var(--border2); border-radius: 14px; background: var(--bg3); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 16px; resize: none; max-height: 100px; line-height: 1.5; transition: border-color 0.15s; }
    .chat-in:focus { outline: none; border-color: var(--gold); }
    .chat-in::placeholder { color: var(--text3); }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: linear-gradient(135deg, #C9A84C, #E8C97A); color: #0F0E0C; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; flex-shrink: 0; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text3); }
    .welcome i { font-size: 40px; color: var(--gold); opacity: 0.4; }
    .welcome p { font-size: 13px; text-align: center; max-width: 200px; line-height: 1.6; font-family: 'Lora', serif; font-style: italic; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-top">
    <div class="app-title">✦ Avatar IA</div>
    <button class="new-btn" onclick="newProfile()"><i class="ti ti-plus"></i> Nuevo avatar</button>
  </div>
  <div class="avatars-list" id="avList"><div class="empty-list">Aún no hay avatares.<br>Crea el primero.</div></div>
</div>

<div class="main">
  <div class="setup" id="setupPanel">
    <div class="setup-header">
      <div class="setup-title" id="setupTitle">Nuevo avatar</div>
      <div class="saved-badge" id="savedBadge"><i class="ti ti-check"></i> Guardado</div>
    </div>
    <div>
      <div class="field-label"><i class="ti ti-camera"></i> Foto</div>
      <div class="photo-row">
        <div class="photo-circle" id="photoCircle" onclick="document.getElementById('photoIn').click()">?</div>
        <div class="photo-hint">Toca para subir una foto.<br>Se guarda con el perfil.</div>
        <input type="file" id="photoIn" accept="image/*" style="display:none">
      </div>
    </div>
    <div>
      <div class="field-label"><i class="ti ti-user"></i> Nombre</div>
      <input class="text-in" id="inName" placeholder="Nombre de la persona..." oninput="onNameChange(this.value)">
    </div>
    <div>
      <div class="field-label"><i class="ti ti-brain"></i> Personalidad y descripción</div>
      <textarea class="text-in" id="inBio" rows="4" placeholder="Describe cómo era: su carácter, forma de hablar, temas que le gustaban, vuestra relación, su profesión..."></textarea>
    </div>
    <div>
      <div class="field-label"><i class="ti ti-quote"></i> Memorias y frases suyas</div>
      <div class="mem-list" id="memList"></div>
      <div class="mem-row">
        <input id="memIn" placeholder="Añade una frase, recuerdo o anécdota..." onkeydown="if(event.key==='Enter'){addMem();event.preventDefault();}">
        <button class="add-btn" onclick="addMem()"><i class="ti ti-plus"></i> Añadir</button>
      </div>
    </div>
    <button class="activate-btn" onclick="activate()"><i class="ti ti-sparkles"></i> Activar avatar y chatear</button>
  </div>

  <div class="chat hidden" id="chatPanel">
    <div class="chat-head">
      <div class="ch-av" id="chAv"></div>
      <div class="ch-info">
        <h3 id="chName"></h3>
        <p id="chSub"></p>
      </div>
      <i class="ti ti-pencil ch-edit" onclick="editCurrent()" title="Editar perfil"></i>
    </div>
    <div class="messages" id="msgs">
      <div class="welcome" id="welcome">
        <i class="ti ti-ghost-2"></i>
        <p>El avatar está listo.<br>Empieza a escribir.</p>
      </div>
    </div>
    <div class="input-wrap">
      <textarea class="chat-in" id="chatIn" placeholder="Escribe tu mensaje..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()"><i class="ti ti-send" style="font-size:16px"></i></button>
    </div>
  </div>
</div>

<script>
let profiles = {}, currentId = null, busy = false, currentPhoto = null;

function load() {
  try { profiles = JSON.parse(localStorage.getItem('avatar_profiles') || '{}'); } catch(e) { profiles = {}; }
  renderList();
  const ids = Object.keys(profiles);
  if (ids.length) selectProfile(ids[ids.length - 1]);
}

function save() {
  localStorage.setItem('avatar_profiles', JSON.stringify(profiles));
  const b = document.getElementById('savedBadge');
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 2000);
}

function uid() { return 'av_' + Date.now(); }

function renderList() {
  const list = document.getElementById('avList');
  const ids = Object.keys(profiles);
  if (!ids.length) { list.innerHTML = '<div class="empty-list">Aún no hay avatares.<br>Crea el primero.</div>'; return; }
  list.innerHTML = ids.map(id => {
    const p = profiles[id];
    const init = p.name ? p.name[0].toUpperCase() : '?';
    const avH = p.photo ? '<img src="' + p.photo + '" alt="">' : init;
    const msgs = (p.history||[]).filter(m=>m.role==='user').length;
    return `<div class="av-item${id===currentId?' active':''}" id="item_${id}" onclick="selectProfile('${id}')">
      <div class="av-thumb">${avH}</div>
      <div class="av-meta"><div class="av-name">${p.name||'Sin nombre'}</div><div class="av-count">${msgs} mensaje${msgs!==1?'s':''}</div></div>
      <i class="ti ti-trash av-del" onclick="deletePr(event,'${id}')"></i>
    </div>`;
  }).join('');
}

function newProfile() {
  currentId = null; currentPhoto = null;
  document.getElementById('inName').value = '';
  document.getElementById('inBio').value = '';
  document.getElementById('memList').innerHTML = '';
  document.getElementById('photoCircle').innerHTML = '?';
  document.getElementById('setupTitle').textContent = 'Nuevo avatar';
  document.getElementById('setupPanel').classList.remove('hidden');
  document.getElementById('chatPanel').classList.add('hidden');
  document.querySelectorAll('.av-item').forEach(e => e.classList.remove('active'));
}

function selectProfile(id) {
  currentId = id;
  const p = profiles[id];
  currentPhoto = p.photo || null;
  document.querySelectorAll('.av-item').forEach(e => e.classList.remove('active'));
  const item = document.getElementById('item_' + id);
  if (item) item.classList.add('active');
  if (p.activated) showChat(p); else showEdit(p);
}

function showEdit(p) {
  document.getElementById('inName').value = p.name || '';
  document.getElementById('inBio').value = p.bio || '';
  document.getElementById('setupTitle').textContent = 'Editar avatar';
  document.getElementById('setupPanel').classList.remove('hidden');
  document.getElementById('chatPanel').classList.add('hidden');
  const c = document.getElementById('photoCircle');
  c.innerHTML = p.photo ? '<img src="' + p.photo + '" alt="">' : (p.name ? p.name[0].toUpperCase() : '?');
  renderMems(p.memories || []);
}

function showChat(p) {
  document.getElementById('setupPanel').classList.add('hidden');
  document.getElementById('chatPanel').classList.remove('hidden');
  const init = p.name ? p.name[0].toUpperCase() : '?';
  document.getElementById('chAv').innerHTML = p.photo ? '<img src="' + p.photo + '" alt="">' : init;
  document.getElementById('chName').textContent = p.name || 'Avatar';
  document.getElementById('chSub').textContent = (p.memories||[]).length + ' memorias guardadas';
  renderMsgs(p.history || []);
}

function renderMems(mems) {
  document.getElementById('memList').innerHTML = mems.map((m,i) =>
    `<div class="mem-item"><i class="ti ti-quote"></i><span>${m}</span><i class="ti ti-x mem-x" onclick="delMem(${i})"></i></div>`
  ).join('');
}

function getMemsTmp() {
  return Array.from(document.querySelectorAll('#memList .mem-item span')).map(s => s.textContent);
}

function addMem() {
  const inp = document.getElementById('memIn');
  const v = inp.value.trim(); if (!v) return; inp.value = '';
  if (currentId && profiles[currentId]) {
    if (!profiles[currentId].memories) profiles[currentId].memories = [];
    profiles[currentId].memories.push(v);
    renderMems(profiles[currentId].memories); save();
  } else {
    const m = getMemsTmp(); m.push(v); renderMems(m);
  }
}

function delMem(i) {
  if (currentId && profiles[currentId]) {
    profiles[currentId].memories.splice(i, 1);
    renderMems(profiles[currentId].memories); save();
  } else {
    const m = getMemsTmp(); m.splice(i,1); renderMems(m);
  }
}

function onNameChange(v) {
  const el = document.getElementById('photoCircle');
  if (!el.querySelector('img')) el.innerHTML = v.trim() ? v.trim()[0].toUpperCase() : '?';
}

document.getElementById('photoIn').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = function(ev) {
    currentPhoto = ev.target.result;
    document.getElementById('photoCircle').innerHTML = '<img src="' + ev.target.result + '" alt="">';
    if (currentId && profiles[currentId]) { profiles[currentId].photo = ev.target.result; save(); renderList(); }
  };
  r.readAsDataURL(file);
});

function activate() {
  const name = document.getElementById('inName').value.trim();
  const bio = document.getElementById('inBio').value.trim();
  if (!name) { alert('Por favor introduce el nombre.'); return; }
  if (!bio) { alert('Por favor añade una descripción.'); return; }
  const mems = getMemsTmp();
  const id = currentId || uid(); currentId = id;
  if (!profiles[id]) profiles[id] = { history: [] };
  Object.assign(profiles[id], { name, bio, memories: mems, photo: currentPhoto, activated: true });
  if (!profiles[id].history) profiles[id].history = [];
  save(); renderList(); showChat(profiles[id]);
  if (!profiles[id].history.length) addBotMsg('Hola... estoy aquí. ¿En qué puedo ayudarte?');
}

function editCurrent() { if (currentId) showEdit(profiles[currentId]); }

function deletePr(e, id) {
  e.stopPropagation();
  if (!confirm('¿Eliminar este avatar y toda su conversación?')) return;
  delete profiles[id];
  if (currentId === id) { currentId = null; newProfile(); }
  save(); renderList();
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 60000) return 'ahora';
  if (diff < 3600000) return Math.floor(diff/60000) + ' min';
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('es',{day:'numeric',month:'short'});
}

function renderMsgs(history) {
  const c = document.getElementById('msgs');
  c.innerHTML = '';
  if (!history.length) {
    c.innerHTML = '<div class="welcome" id="welcome"><i class="ti ti-ghost-2"></i><p>El avatar está listo.<br>Empieza a escribir.</p></div>';
    return;
  }
  history.forEach(m => { if (m.role==='user') appendUser(m.content, m.time); else appendBot(m.content, m.time); });
  c.scrollTop = c.scrollHeight;
}

function appendBot(text, ts) {
  const p = profiles[currentId];
  const init = p && p.name ? p.name[0].toUpperCase() : '?';
  const avH = p && p.photo ? '<img src="' + p.photo + '" alt="">' : init;
  const c = document.getElementById('msgs');
  const w = document.getElementById('welcome'); if (w) w.remove();
  const msgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
  const d = document.createElement('div'); d.className = 'msg';
  d.innerHTML = `<div class="msg-av">${avH}</div><div>
    <div class="bubble">${text.replace(/\n/g,'<br>')}</div>
    <div class="msg-actions">
      <div class="msg-time">${fmtTime(ts)}</div>
      <button class="play-btn" id="play_${msgId}" onclick="playVoice(this, ${JSON.stringify(text)})">
        <i class="ti ti-volume"></i> Escuchar
      </button>
    </div>
  </div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

function appendUser(text, ts) {
  const c = document.getElementById('msgs');
  const w = document.getElementById('welcome'); if (w) w.remove();
  const d = document.createElement('div'); d.className = 'msg user';
  d.innerHTML = `<div class="msg-av">Tú</div><div><div class="bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${fmtTime(ts)}</div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

async function playVoice(btn, text) {
  if (btn.classList.contains('playing')) return;
  btn.classList.add('playing');
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Cargando...';
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tts: text })
    });
    const data = await resp.json();
    if (data.audio) {
      const audio = new Audio('data:audio/mpeg;base64,' + data.audio);
      btn.innerHTML = '<i class="ti ti-volume"></i> Reproduciendo...';
      audio.play();
      audio.onended = () => { btn.classList.remove('playing'); btn.innerHTML = '<i class="ti ti-volume"></i> Escuchar'; };
    } else {
      btn.classList.remove('playing');
      btn.innerHTML = '<i class="ti ti-volume"></i> Escuchar';
      alert('Error de voz: ' + (data.error || 'desconocido'));
    }
  } catch(err) {
    btn.classList.remove('playing');
    btn.innerHTML = '<i class="ti ti-volume"></i> Escuchar';
  }
}

function addBotMsg(text) {
  const ts = Date.now();
  if (currentId && profiles[currentId]) {
    profiles[currentId].history.push({ role:'assistant', content:text, time:ts });
    save();
  }
  appendBot(text, ts);
}

function showTyping() {
  const p = profiles[currentId];
  const init = p && p.name ? p.name[0].toUpperCase() : '?';
  const avH = p && p.photo ? '<img src="' + p.photo + '" alt="">' : init;
  const c = document.getElementById('msgs');
  const d = document.createElement('div'); d.className = 'msg'; d.id = 'typing';
  d.innerHTML = `<div class="msg-av">${avH}</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function send() {
  if (!currentId || busy) return;
  const inp = document.getElementById('chatIn');
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  const ts = Date.now();
  profiles[currentId].history.push({ role:'user', content:text, time:ts });
  save(); appendUser(text, ts);
  busy = true; document.getElementById('sendBtn').disabled = true; showTyping();
  const p = profiles[currentId];
  const memText = (p.memories||[]).length ? '\n\nFragmentos de su forma de hablar:\n' + p.memories.map(m=>'- '+m).join('\n') : '';
  const system = `Eres un avatar que encarna la personalidad de ${p.name}.\n\nDescripción: ${p.bio}${memText}\n\nINSTRUCCIONES:\n- Responde siempre en primera persona como ${p.name}.\n- Imita su tono, vocabulario y carácter.\n- Sé natural y espontáneo. Respuestas cortas (2-4 oraciones) salvo que pidan más.\n- Nunca rompas el personaje ni menciones que eres una IA.`;
  const messages = p.history.filter(m=>m.role==='user'||m.role==='assistant').slice(-20).map(m=>({role:m.role,content:m.content}));
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system, messages })
    });
    const data = await resp.json();
    removeTyping();
    if (data.reply) addBotMsg(data.reply);
    else addBotMsg('Lo siento, no pude responder. (' + (data.error||'error') + ')');
  } catch(err) {
    removeTyping();
    addBotMsg('Error de conexión: ' + err.message);
  }
  busy = false; document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatIn').focus();
}

const style = document.createElement('style');
style.textContent = '@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }';
document.head.appendChild(style);

load();
</script>
</body>
</html>
